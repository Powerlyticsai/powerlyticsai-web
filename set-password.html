<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="robots" content="noindex,nofollow" />
<title>Set your Powerlytics password</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500&family=Inter+Tight:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e14;
    --bg-card: #141b26;
    --border: #1f2937;
    --border-light: #2a3644;
    --text: #e8edf4;
    --text-dim: #8a96a8;
    --accent: #ffb400;
    --green: #5cd989;
    --red: #ff6b6b;
    --display: "Fraunces", Georgia, serif;
    --body: "Inter Tight", -apple-system, sans-serif;
    --mono: "JetBrains Mono", ui-monospace, monospace;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--body);
    font-size: 14px;
    line-height: 1.5;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    display: flex; align-items: center; justify-content: center;
  }
  .card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 36px;
    width: 100%;
    max-width: 440px;
    margin: 24px;
  }
  h1 {
    font-family: var(--display);
    font-weight: 500;
    font-size: 26px;
    letter-spacing: -0.01em;
    margin-bottom: 8px;
  }
  h1 em { color: var(--accent); font-style: italic; }
  .lede { font-family: var(--mono); font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 24px; }
  label { display: block; margin-top: 14px; font-family: var(--mono); font-size: 10px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 6px; }
  input { width: 100%; background: var(--bg); border: 1px solid var(--border-light); color: var(--text); padding: 10px 12px; border-radius: 3px; font-family: inherit; font-size: 14px; }
  input:focus { outline: none; border-color: var(--accent); }
  .err { margin-top: 14px; color: var(--red); font-family: var(--mono); font-size: 12px; min-height: 16px; }
  .ok { margin-top: 14px; color: var(--green); font-family: var(--mono); font-size: 12px; }
  .hint { margin-top: 6px; font-size: 11px; color: var(--text-dim); font-family: var(--mono); }
  button {
    width: 100%;
    margin-top: 22px;
    padding: 11px 18px;
    background: var(--accent);
    border: none;
    color: #0a0e14;
    border-radius: 3px;
    font-family: var(--body);
    font-weight: 600;
    font-size: 14px;
    cursor: pointer;
  }
  button:hover { background: #e3a000; }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  a.modal-link { display: block; margin-top: 14px; font-family: var(--mono); font-size: 11px; color: var(--text-dim); text-decoration: none; text-transform: uppercase; letter-spacing: 0.08em; }
  a.modal-link:hover { color: var(--accent); }
</style>
</head>
<body>

<div class="card">
  <div id="form-pane">
    <h1>Set your <em>password</em></h1>
    <p class="lede">Welcome to Powerlytics.ai</p>
    <form id="setForm" autocomplete="on">
      <label for="pw1">New password</label>
      <input id="pw1" type="password" required autocomplete="new-password" minlength="8" />
      <p class="hint">At least 8 characters.</p>
      <label for="pw2">Confirm password</label>
      <input id="pw2" type="password" required autocomplete="new-password" minlength="8" />
      <div class="err" id="err"></div>
      <button type="submit" id="submit">Set password</button>
    </form>
  </div>

  <div id="done-pane" style="display:none;">
    <h1>All <em>set</em></h1>
    <p class="lede">Your password is saved</p>
    <p style="margin-top:6px;color:var(--text-dim);font-size:13px;">You can now sign in from the "Subscribers Only" button on the main site.</p>
    <a href="/" class="modal-link">← Back to powerlyticsai.com</a>
  </div>
</div>

<script>
const ADMIN_API = "https://admin-api.powerlyticsai.com";
const params = new URLSearchParams(location.search);
const token = params.get("token") || "";
const errEl = document.getElementById("err");

if (!token) {
  errEl.textContent = "Missing token in URL. Use the link from your invite email.";
  document.getElementById("submit").disabled = true;
}

document.getElementById("setForm").addEventListener("submit", async (e) => {
  e.preventDefault();
  errEl.textContent = "";
  const pw1 = document.getElementById("pw1").value;
  const pw2 = document.getElementById("pw2").value;
  if (pw1 !== pw2) { errEl.textContent = "Passwords do not match"; return; }
  if (pw1.length < 8) { errEl.textContent = "Password must be at least 8 characters"; return; }
  const btn = document.getElementById("submit");
  btn.disabled = true; btn.textContent = "Saving…";
  try {
    const r = await fetch(ADMIN_API + "/subscribers/set-password", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ token, password: pw1 }),
    });
    const data = await r.json().catch(() => ({}));
    if (!r.ok) { errEl.textContent = data.error || "Failed to set password"; btn.disabled = false; btn.textContent = "Set password"; return; }
    document.getElementById("form-pane").style.display = "none";
    document.getElementById("done-pane").style.display = "block";
  } catch (err) {
    errEl.textContent = "Network error: " + err.message;
    btn.disabled = false; btn.textContent = "Set password";
  }
});
</script>
</body>
</html>
