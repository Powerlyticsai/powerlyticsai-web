<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="robots" content="noindex,nofollow" />
<title>Powerlytics Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e14;
    --bg-elev: #11161f;
    --bg-card: #141b26;
    --border: #1f2937;
    --border-light: #2a3644;
    --text: #e8edf4;
    --text-dim: #8a96a8;
    --text-faint: #4a5568;
    --accent: #ffb400;
    --cyan: #4dd4e0;
    --green: #5cd989;
    --red: #ff6b6b;
    --body: "Inter Tight", -apple-system, sans-serif;
    --mono: "JetBrains Mono", ui-monospace, monospace;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--body);
    font-size: 14px;
    line-height: 1.5;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  header {
    border-bottom: 1px solid var(--border);
    padding: 16px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--bg-elev);
    position: sticky; top: 0; z-index: 5;
  }
  h1 { font-size: 16px; font-weight: 500; letter-spacing: -0.01em; }
  h1 .dot { color: var(--accent); }
  h2 { font-size: 14px; font-weight: 500; margin-bottom: 12px; color: var(--text); }
  .btn-logout {
    background: transparent;
    border: 1px solid var(--border-light);
    color: var(--text);
    padding: 6px 14px;
    border-radius: 3px;
    font-family: var(--mono);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    cursor: pointer;
  }
  .btn-logout:hover { border-color: var(--accent); color: var(--accent); }

  main { padding: 32px; max-width: 1700px; margin: 0 auto; }

  /* ── LOGIN ────────────────────────── */
  .login-card {
    max-width: 420px;
    margin: 80px auto;
    padding: 32px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 6px;
  }
  .login-card label { display: block; margin-top: 16px; font-family: var(--mono); font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.08em; }
  .login-card input { width: 100%; margin-top: 6px; padding: 10px 12px; background: var(--bg); color: var(--text); border: 1px solid var(--border-light); border-radius: 3px; font-family: inherit; font-size: 14px; }
  .login-card input:focus { outline: none; border-color: var(--accent); }
  .login-card .err { color: var(--red); margin-top: 14px; font-size: 12px; min-height: 16px; font-family: var(--mono); }
  button.primary {
    width: 100%;
    margin-top: 18px;
    padding: 11px 18px;
    background: var(--accent);
    border: none;
    color: #0a0e14;
    border-radius: 3px;
    font-family: inherit;
    font-weight: 600;
    cursor: pointer;
  }
  button.primary:hover { background: #e3a000; }
  button.primary:disabled { opacity: 0.5; cursor: not-allowed; }

  /* ── DASHBOARD ───────────────────── */
  .dash-grid {
    display: grid;
    grid-template-columns: 320px 1fr;
    gap: 24px;
    align-items: start;
  }
  .panel {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 20px;
  }

  .filters { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 16px; }
  .filters input, .filters select {
    background: var(--bg);
    border: 1px solid var(--border-light);
    color: var(--text);
    padding: 8px 12px;
    border-radius: 3px;
    font-family: inherit;
    font-size: 13px;
  }
  .filters input:focus, .filters select:focus { outline: none; border-color: var(--accent); }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 12px;
    font-family: var(--mono);
  }
  thead { background: var(--bg-elev); }
  th, td { text-align: left; padding: 10px 12px; border-bottom: 1px solid var(--border); }
  th { font-weight: 500; color: var(--text-dim); text-transform: uppercase; font-size: 10px; letter-spacing: 0.08em; }
  tr.row { cursor: pointer; }
  tr.row:hover td { background: rgba(255,180,0,0.04); }
  tr.row.active td { background: rgba(255,180,0,0.10); }
  .ip-pill { font-family: var(--mono); padding: 2px 6px; border-radius: 2px; font-size: 10px; }
  .ip-pill.set { background: rgba(92,217,137,0.15); color: var(--green); }
  .ip-pill.unset { background: rgba(255,107,107,0.15); color: var(--red); }
  .ip-pill.unlocked { background: rgba(77,212,224,0.15); color: var(--cyan); }

  .sub-pill { font-family: var(--mono); font-size: 10px; padding: 2px 6px; border-radius: 2px; }
  .sub-pill.ok { background: rgba(92,217,137,0.15); color: var(--green); }
  .sub-pill.soon { background: rgba(255,180,0,0.15); color: var(--accent); }
  .sub-pill.exp { background: rgba(255,107,107,0.15); color: var(--red); }
  .sub-pill.none { background: rgba(74,85,104,0.20); color: var(--text-faint); }

  /* Detail / form panel */
  .form-row { margin-bottom: 12px; }
  .form-row label { display: block; font-family: var(--mono); font-size: 10px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 4px; }
  .form-row input, .form-row textarea {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border-light);
    color: var(--text);
    padding: 8px 12px;
    border-radius: 3px;
    font-family: inherit;
    font-size: 13px;
  }
  .form-row input:focus, .form-row textarea:focus { outline: none; border-color: var(--accent); }
  .form-row textarea { min-height: 70px; resize: vertical; font-family: var(--body); }

  .checks { display: grid; grid-template-columns: 1fr 1fr; gap: 4px 12px; margin-top: 6px; }
  .checks label {
    display: flex; align-items: center; gap: 8px;
    font-family: var(--mono); font-size: 11px; color: var(--text);
    text-transform: none; letter-spacing: 0;
    padding: 4px 6px; border-radius: 2px; cursor: pointer;
  }
  .checks label:hover { background: rgba(255,180,0,0.05); }
  .checks input { accent-color: var(--accent); }

  .row-actions { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 16px; }
  .row-actions button {
    background: transparent; border: 1px solid var(--border-light); color: var(--text);
    padding: 7px 12px; border-radius: 3px; font-family: var(--mono); font-size: 10px;
    text-transform: uppercase; letter-spacing: 0.08em; cursor: pointer;
  }
  .row-actions button:hover { border-color: var(--accent); color: var(--accent); }
  .row-actions button.danger:hover { border-color: var(--red); color: var(--red); }

  .toast {
    position: fixed; bottom: 24px; right: 24px; z-index: 50;
    background: var(--bg-elev); border: 1px solid var(--border-light);
    padding: 12px 18px; border-radius: 4px; font-size: 13px;
    max-width: 420px; opacity: 0; transition: opacity 0.2s;
  }
  .toast.show { opacity: 1; }
  .toast.err { border-color: var(--red); color: var(--red); }
  .toast.ok { border-color: var(--green); color: var(--green); }

  .empty { color: var(--text-dim); padding: 16px; text-align: center; font-family: var(--mono); font-size: 12px; }
  .copy-link {
    margin-top: 8px;
    padding: 8px 12px;
    background: rgba(255,180,0,0.06);
    border: 1px dashed var(--accent);
    border-radius: 3px;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--accent);
    word-break: break-all;
  }
  .section-divider {
    height: 1px;
    background: var(--border);
    margin: 24px 0;
  }
</style>
</head>
<body>

<!-- ─── LOGIN ────────────────────────── -->
<section id="loginScreen" style="display:none;">
  <div class="login-card">
    <h1>Powerlytics<span class="dot">.</span>ai admin</h1>
    <p style="color: var(--text-dim); font-size: 12px; margin-top: 8px; font-family: var(--mono);">Sign in to manage subscribers</p>
    <form id="loginForm" autocomplete="on">
      <label for="loginEmail">Email</label>
      <input id="loginEmail" type="email" required autocomplete="username" />
      <label for="loginPassword">Password</label>
      <input id="loginPassword" type="password" required autocomplete="current-password" />
      <div class="err" id="loginErr"></div>
      <button type="submit" class="primary" id="loginSubmit">Sign in</button>
    </form>
  </div>
</section>

<!-- ─── DASHBOARD ─────────────────── -->
<section id="dashScreen" style="display:none;">
  <header>
    <h1>Powerlytics<span class="dot">.</span>ai admin</h1>
    <div style="display:flex; gap: 16px; align-items: center;">
      <span id="adminWho" style="color: var(--text-dim); font-family: var(--mono); font-size: 11px;"></span>
      <button class="btn-logout" id="logoutBtn">Sign out</button>
    </div>
  </header>

  <main>
    <div class="dash-grid">
      <!-- LEFT: list + filters + add -->
      <div class="panel">
        <h2>Subscribers</h2>
        <div class="filters">
          <input id="filterQ" placeholder="Search name / email / address" style="flex:1; min-width: 160px;" />
          <input id="filterCountry" placeholder="Country" style="width: 110px;" />
          <select id="filterIp">
            <option value="">Any IP</option>
            <option value="true">Has IP</option>
            <option value="false">No IP</option>
          </select>
        </div>
        <table>
          <thead><tr><th>Email</th><th>Name</th><th>IP</th><th>Expires</th></tr></thead>
          <tbody id="subscriberRows"></tbody>
        </table>
        <div id="emptyMsg" class="empty" style="display:none;">No subscribers yet.</div>

        <div class="section-divider"></div>
        <button class="primary" id="newSubscriberBtn" style="width:auto;">+ Add new subscriber</button>
      </div>

      <!-- RIGHT: detail / edit form -->
      <div class="panel" id="detailPanel">
        <div id="defaultPane">
          <h2>Defaults — non-subscribers</h2>
          <p style="color: var(--text-dim); font-size: 12px; margin-bottom: 14px;">
            Apps available to anyone who hasn't signed in.
          </p>
          <h3 style="font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 8px;">Dx apps</h3>
          <div class="checks" id="defaultsDx"></div>
          <h3 style="font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.08em; margin: 18px 0 8px;">Tx apps</h3>
          <div class="checks" id="defaultsTx"></div>
          <button class="primary" id="saveDefaultsBtn" style="width:auto; margin-top: 18px;">Save defaults</button>
        </div>

        <div id="editPane" style="display:none;">
          <h2 id="editTitle">New subscriber</h2>

          <div class="form-row"><label>Email</label><input id="fEmail" type="email" /></div>
          <div class="form-row"><label>First name</label><input id="fFirst" /></div>
          <div class="form-row"><label>Last name</label><input id="fLast" /></div>
          <div class="form-row"><label>Mailing address</label><textarea id="fAddress"></textarea></div>
          <div class="form-row"><label>Country</label><input id="fCountry" /></div>

          <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 12px;">
            <div class="form-row"><label>Subscription start</label><input id="fSubStart" type="date" /></div>
            <div class="form-row"><label>Subscription end</label><input id="fSubEnd" type="date" /></div>
          </div>
          <div id="subStatusLine" style="margin-top:-4px;margin-bottom:14px;font-family:var(--mono);font-size:11px;color:var(--text-dim);"></div>

          <h3 style="font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.08em; margin: 16px 0 8px;">Dx apps</h3>
          <div class="checks" id="formDx"></div>

          <h3 style="font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.08em; margin: 16px 0 8px;">Tx apps</h3>
          <div class="checks" id="formTx"></div>

          <div class="form-row" style="margin-top: 16px;">
            <label style="display: inline-flex; align-items: center; gap: 8px; text-transform: none; letter-spacing: 0; font-family: var(--mono); font-size: 11px; color: var(--text);">
              <input type="checkbox" id="fIpLocked" checked style="accent-color: var(--accent);">
              Enforce IP pin (uncheck to bypass for this user)
            </label>
          </div>

          <div id="ipDisplay" style="display:none;" class="form-row">
            <label>Captured IP</label>
            <div style="font-family: var(--mono); font-size: 12px; color: var(--text);" id="ipDisplayValue"></div>
          </div>

          <div id="setPwLink" style="display:none;" class="copy-link"></div>

          <div class="row-actions">
            <button id="saveBtn">Save</button>
            <button id="sendReminderBtn">Send expiry reminder now</button>
            <button id="resetIpBtn">Reset captured IP</button>
            <button id="resendSetPwBtn">Send new set-password link</button>
            <button id="cancelBtn">Cancel</button>
            <span style="flex:1"></span>
            <button id="deleteBtn" class="danger">Delete</button>
          </div>
        </div>
      </div>
    </div>
  </main>
</section>

<div id="toast" class="toast"></div>

<script>
"use strict";

// API base — Caddy proxies admin-api.powerlyticsai.com to the VPS Express app.
const API = "https://admin-api.powerlyticsai.com";

// App lists (must mirror the source repos — Phase 3 wires Dx/Tx to read these)
const DX_APPS = [
  { id: "powerflow",       label: "Power Flow" },
  { id: "shortcircuit",    label: "Fault Study" },
  { id: "arcflash",        label: "Arc Flash" },
  { id: "hostingcapacity", label: "Hosting Capacity" },
  { id: "interconnection", label: "Interconnection Analysis" },
  { id: "derms",           label: "DERMS" },
  { id: "assetmgmt",       label: "Asset Management" },
  { id: "investmentplan",  label: "Utility Investment Planning" },
  { id: "commissionreport",label: "Utility Commission Report Generator" },
  { id: "loadforecast",    label: "Load Forecast" },
  { id: "modelbuilder",    label: "Model Builder" },
  { id: "dataquality",     label: "Data Quality Auditor" },
  { id: "virtualplanner",  label: "Virtual Distribution Planner Agent" },
];

const TX_APPS = [
  { id: "pf",   label: "Power Flow" },
  { id: "dcpf", label: "DC Power Flow" },
  { id: "opf",  label: "Optimal PF" },
  { id: "sc",   label: "Short Circuit" },
  { id: "n1",   label: "N-1 Contingency" },
  { id: "se",   label: "State Estimation" },
  { id: "ts",   label: "Time Series" },
  { id: "hc",   label: "Hosting Capacity" },
  { id: "diag", label: "Diagnostic" },
];

// ── Token persistence ────────────────────────────────────────────────────────
const TOKEN_KEY = "pl_admin_token";
let token = sessionStorage.getItem(TOKEN_KEY) || "";
let currentSubscriber = null;
let currentList = [];

// ── Helpers ──────────────────────────────────────────────────────────────────
function $(id) { return document.getElementById(id); }
function showToast(msg, cls) {
  const t = $("toast");
  t.textContent = msg;
  t.className = "toast show " + (cls || "");
  setTimeout(() => t.className = "toast " + (cls || ""), 2800);
}

async function api(path, opts = {}) {
  const headers = { "Content-Type": "application/json", ...(opts.headers || {}) };
  if (token) headers.Authorization = `Bearer ${token}`;
  const resp = await fetch(API + path, { ...opts, headers });
  if (resp.status === 401) {
    sessionStorage.removeItem(TOKEN_KEY);
    token = "";
    showLogin();
    throw new Error("Auth expired — sign in again");
  }
  const data = await resp.json().catch(() => ({}));
  if (!resp.ok) throw new Error(data.error || `HTTP ${resp.status}`);
  return data;
}

// ── Login ────────────────────────────────────────────────────────────────────
function showLogin() {
  $("loginScreen").style.display = "block";
  $("dashScreen").style.display = "none";
}
function showDash(email) {
  $("loginScreen").style.display = "none";
  $("dashScreen").style.display = "block";
  $("adminWho").textContent = email || "";
  buildDefaultsCheckboxes();
  loadDefaults();
  loadSubscribers();
}

$("loginForm").addEventListener("submit", async (e) => {
  e.preventDefault();
  const btn = $("loginSubmit");
  btn.disabled = true;
  $("loginErr").textContent = "";
  try {
    const data = await api("/admin/login", {
      method: "POST",
      body: JSON.stringify({
        email: $("loginEmail").value.trim(),
        password: $("loginPassword").value,
      }),
    });
    token = data.token;
    sessionStorage.setItem(TOKEN_KEY, token);
    showDash($("loginEmail").value.trim());
  } catch (err) {
    $("loginErr").textContent = err.message;
  }
  btn.disabled = false;
});

$("logoutBtn").addEventListener("click", () => {
  sessionStorage.removeItem(TOKEN_KEY);
  token = "";
  showLogin();
});

// ── Defaults editor ─────────────────────────────────────────────────────────
function buildDefaultsCheckboxes() {
  $("defaultsDx").innerHTML = DX_APPS.map(a => checkRow("ddx", a)).join("");
  $("defaultsTx").innerHTML = TX_APPS.map(a => checkRow("dtx", a)).join("");
  $("formDx").innerHTML = DX_APPS.map(a => checkRow("fdx", a)).join("");
  $("formTx").innerHTML = TX_APPS.map(a => checkRow("ftx", a)).join("");
}
function checkRow(prefix, app) {
  const id = `${prefix}-${app.id}`;
  return `<label for="${id}"><input type="checkbox" id="${id}" data-id="${app.id}"> ${escape(app.label)}</label>`;
}
function readChecks(prefix) {
  return Array.from(document.querySelectorAll(`#${prefix.startsWith("d") ? "defaults" : "form"}${prefix.endsWith("dx") ? "Dx" : "Tx"} input:checked`))
    .map(i => i.dataset.id);
}
function writeChecks(prefix, ids) {
  const set = new Set(ids || []);
  document.querySelectorAll(`#${prefix.startsWith("d") ? "defaults" : "form"}${prefix.endsWith("dx") ? "Dx" : "Tx"} input`)
    .forEach(i => i.checked = set.has(i.dataset.id));
}

async function loadDefaults() {
  try {
    const data = await api("/admin/defaults");
    writeChecks("ddx", data.dx_apps);
    writeChecks("dtx", data.tx_apps);
  } catch (err) { showToast(err.message, "err"); }
}

$("saveDefaultsBtn").addEventListener("click", async () => {
  try {
    await api("/admin/defaults", {
      method: "PATCH",
      body: JSON.stringify({
        dx_apps: readChecks("ddx"),
        tx_apps: readChecks("dtx"),
      }),
    });
    showToast("Defaults saved", "ok");
  } catch (err) { showToast(err.message, "err"); }
});

// ── Subscriber list ─────────────────────────────────────────────────────────
async function loadSubscribers() {
  const params = new URLSearchParams();
  const q = $("filterQ").value.trim();
  const c = $("filterCountry").value.trim();
  const ip = $("filterIp").value;
  if (q) params.set("q", q);
  if (c) params.set("country", c);
  if (ip) params.set("has_ip", ip);
  try {
    const data = await api("/admin/subscribers" + (params.toString() ? "?" + params : ""));
    currentList = data.subscribers || [];
    renderList();
  } catch (err) { showToast(err.message, "err"); }
}

function daysUntil(iso) {
  if (!iso) return null;
  const today = new Date(); today.setUTCHours(0,0,0,0);
  const end = new Date(iso + "T00:00:00Z");
  return Math.round((end.getTime() - today.getTime()) / (24 * 60 * 60 * 1000));
}

function expiryPill(iso) {
  const days = daysUntil(iso);
  if (days === null) return `<span class="sub-pill none">no end set</span>`;
  if (days < 0) return `<span class="sub-pill exp" title="${escape(iso)}">expired ${-days}d ago</span>`;
  if (days === 0) return `<span class="sub-pill exp" title="${escape(iso)}">expires today</span>`;
  if (days <= 14) return `<span class="sub-pill soon" title="${escape(iso)}">in ${days}d</span>`;
  return `<span class="sub-pill ok" title="${escape(iso)}">in ${days}d</span>`;
}

function renderList() {
  const tb = $("subscriberRows");
  tb.innerHTML = currentList.map(s => {
    const ipHtml = !s.captured_ip
      ? `<span class="ip-pill unset">—</span>`
      : !s.ip_locked
      ? `<span class="ip-pill unlocked">unlocked</span>`
      : `<span class="ip-pill set" title="${escape(s.captured_ip)}">${escape(s.captured_ip)}</span>`;
    const name = ((s.first_name || "") + " " + (s.last_name || "")).trim() || "—";
    return `<tr class="row${currentSubscriber && currentSubscriber.id === s.id ? " active" : ""}" data-id="${s.id}">
      <td>${escape(s.email)}</td>
      <td>${escape(name)}</td>
      <td>${ipHtml}</td>
      <td>${expiryPill(s.subscription_end)}</td>
    </tr>`;
  }).join("");
  $("emptyMsg").style.display = currentList.length === 0 ? "block" : "none";
  tb.querySelectorAll("tr.row").forEach(tr => {
    tr.addEventListener("click", () => loadOne(Number(tr.dataset.id)));
  });
}

["filterQ", "filterCountry", "filterIp"].forEach(id => {
  $(id).addEventListener("input", debounce(loadSubscribers, 250));
});

function debounce(fn, ms) {
  let t; return (...a) => { clearTimeout(t); t = setTimeout(() => fn(...a), ms); };
}

// ── Detail / edit / new ─────────────────────────────────────────────────────
$("newSubscriberBtn").addEventListener("click", () => {
  currentSubscriber = null;
  $("editTitle").textContent = "New subscriber";
  ["fEmail","fFirst","fLast","fAddress","fCountry","fSubStart","fSubEnd"].forEach(id => $(id).value = "");
  writeChecks("fdx", []);
  writeChecks("ftx", []);
  $("fIpLocked").checked = true;
  $("ipDisplay").style.display = "none";
  $("setPwLink").style.display = "none";
  $("subStatusLine").textContent = "";
  $("deleteBtn").style.display = "none";
  $("resetIpBtn").style.display = "none";
  $("resendSetPwBtn").style.display = "none";
  $("sendReminderBtn").style.display = "none";
  $("defaultPane").style.display = "none";
  $("editPane").style.display = "block";
  renderList();
});

async function loadOne(id) {
  try {
    const data = await api("/admin/subscribers/" + id);
    currentSubscriber = data.subscriber;
    populateForm(data.subscriber);
    $("defaultPane").style.display = "none";
    $("editPane").style.display = "block";
    renderList();
  } catch (err) { showToast(err.message, "err"); }
}

function populateForm(s) {
  $("editTitle").textContent = `Edit · ${s.email}`;
  $("fEmail").value = s.email || "";
  $("fFirst").value = s.first_name || "";
  $("fLast").value = s.last_name || "";
  $("fAddress").value = s.mailing_address || "";
  $("fCountry").value = s.country || "";
  $("fSubStart").value = s.subscription_start || "";
  $("fSubEnd").value = s.subscription_end || "";
  writeChecks("fdx", s.dx_apps || []);
  writeChecks("ftx", s.tx_apps || []);
  $("fIpLocked").checked = !!s.ip_locked;

  // Subscription status line
  const days = daysUntil(s.subscription_end);
  let line = "";
  if (s.subscription_end) {
    if (days < 0) line = `Subscription expired ${-days} days ago.`;
    else if (days === 0) line = "Subscription expires today.";
    else line = `Subscription expires in ${days} day${days === 1 ? "" : "s"}.`;
  }
  if (s.last_reminder_sent_at) {
    line += ` Last reminder: ${new Date(s.last_reminder_sent_at).toISOString().slice(0,16).replace("T"," ")} UTC.`;
  }
  if ((s.reminders_sent || []).length) {
    line += ` Milestones sent: [${(s.reminders_sent || []).join(", ")}].`;
  }
  $("subStatusLine").textContent = line;

  if (s.captured_ip) {
    $("ipDisplay").style.display = "block";
    $("ipDisplayValue").textContent = s.captured_ip + (s.last_login_at ? ` · last login ${new Date(s.last_login_at).toISOString().slice(0,16).replace("T"," ")}` : "");
    $("resetIpBtn").style.display = "inline-block";
  } else {
    $("ipDisplay").style.display = "none";
    $("resetIpBtn").style.display = "none";
  }
  $("setPwLink").style.display = "none";
  $("deleteBtn").style.display = "inline-block";
  $("resendSetPwBtn").style.display = s.has_password ? "none" : "inline-block";
  $("sendReminderBtn").style.display = s.subscription_end ? "inline-block" : "none";
}

$("cancelBtn").addEventListener("click", () => {
  currentSubscriber = null;
  $("editPane").style.display = "none";
  $("defaultPane").style.display = "block";
  renderList();
});

$("saveBtn").addEventListener("click", async () => {
  const payload = {
    email: $("fEmail").value.trim(),
    first_name: $("fFirst").value.trim(),
    last_name: $("fLast").value.trim(),
    mailing_address: $("fAddress").value.trim(),
    country: $("fCountry").value.trim(),
    subscription_start: $("fSubStart").value || null,
    subscription_end: $("fSubEnd").value || null,
    dx_apps: readChecks("fdx"),
    tx_apps: readChecks("ftx"),
    ip_locked: $("fIpLocked").checked,
  };
  if (!payload.email) { showToast("Email is required", "err"); return; }
  try {
    if (currentSubscriber) {
      const d = await api("/admin/subscribers/" + currentSubscriber.id, {
        method: "PATCH", body: JSON.stringify(payload),
      });
      currentSubscriber = d.subscriber;
      showToast("Saved", "ok");
    } else {
      const d = await api("/admin/subscribers", {
        method: "POST", body: JSON.stringify(payload),
      });
      currentSubscriber = d.subscriber;
      const url = location.origin + "/set-password.html?token=" + encodeURIComponent(d.set_password_token);
      $("setPwLink").style.display = "block";
      $("setPwLink").innerHTML = `Set-password link (Phase 2 will email this automatically — copy to send manually):<br>${escape(url)}`;
      showToast("Subscriber created", "ok");
      populateForm(currentSubscriber);
    }
    loadSubscribers();
  } catch (err) { showToast(err.message, "err"); }
});

$("deleteBtn").addEventListener("click", async () => {
  if (!currentSubscriber) return;
  if (!confirm(`Delete subscriber ${currentSubscriber.email}? This cannot be undone.`)) return;
  try {
    await api("/admin/subscribers/" + currentSubscriber.id, { method: "DELETE" });
    currentSubscriber = null;
    $("editPane").style.display = "none";
    $("defaultPane").style.display = "block";
    showToast("Deleted", "ok");
    loadSubscribers();
  } catch (err) { showToast(err.message, "err"); }
});

$("resetIpBtn").addEventListener("click", async () => {
  if (!currentSubscriber) return;
  if (!confirm("Reset captured IP? The subscriber's next login will pin a new IP.")) return;
  try {
    await api("/admin/subscribers/" + currentSubscriber.id + "/reset-ip", { method: "POST" });
    showToast("IP cleared", "ok");
    loadOne(currentSubscriber.id);
    loadSubscribers();
  } catch (err) { showToast(err.message, "err"); }
});

$("sendReminderBtn").addEventListener("click", async () => {
  if (!currentSubscriber) return;
  if (!currentSubscriber.subscription_end) {
    showToast("Set a subscription end date first", "err");
    return;
  }
  try {
    const d = await api("/admin/subscribers/" + currentSubscriber.id + "/send-reminder", { method: "POST" });
    const msg = d.mailer_configured
      ? `Reminder emailed (${d.days_left} days left)`
      : `Reminder logged to service.log (Resend not configured · ${d.days_left} days left)`;
    showToast(msg, "ok");
    loadOne(currentSubscriber.id);
    loadSubscribers();
  } catch (err) { showToast(err.message, "err"); }
});

$("resendSetPwBtn").addEventListener("click", async () => {
  if (!currentSubscriber) return;
  try {
    const d = await api("/admin/subscribers/" + currentSubscriber.id + "/regenerate-set-password-token", { method: "POST" });
    const url = location.origin + "/set-password.html?token=" + encodeURIComponent(d.set_password_token);
    $("setPwLink").style.display = "block";
    $("setPwLink").innerHTML = `New set-password link (Phase 2 will email it automatically):<br>${escape(url)}`;
    showToast("New token issued", "ok");
  } catch (err) { showToast(err.message, "err"); }
});

function escape(s) {
  return String(s == null ? "" : s).replace(/[&<>"']/g, c => ({
    "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;",
  }[c]));
}

// ── Init ────────────────────────────────────────────────────────────────────
if (token) {
  // try a quick admin call to validate
  api("/admin/defaults").then(() => showDash("")).catch(() => showLogin());
} else {
  showLogin();
}
</script>
</body>
</html>
